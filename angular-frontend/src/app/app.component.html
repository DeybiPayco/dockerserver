<div style="max-width: 900px; margin: 30px auto; font-family: Arial, sans-serif;">
  <h1>Gestión de Productos</h1>

  <p *ngIf="mensaje" style="color: green;">{{ mensaje }}</p>

  <!-- Formulario -->
  <div style="background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 24px;">
    <h2>{{ editando ? 'Editar' : 'Nuevo' }} Producto</h2>
    <input [(ngModel)]="productoForm.nombre"      placeholder="Nombre"      style="display:block; margin:8px 0; padding:8px; width:100%;">
    <input [(ngModel)]="productoForm.descripcion" placeholder="Descripción" style="display:block; margin:8px 0; padding:8px; width:100%;">
    <input [(ngModel)]="productoForm.precio"      placeholder="Precio"  type="number" style="display:block; margin:8px 0; padding:8px; width:100%;">
    <input [(ngModel)]="productoForm.stock"       placeholder="Stock"   type="number" style="display:block; margin:8px 0; padding:8px; width:100%;">
    <button (click)="guardar()" style="background:#1976D2; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; margin-right:8px;">
      {{ editando ? 'Actualizar' : 'Crear' }}
    </button>
    <button *ngIf="editando" (click)="resetForm()" style="background:#888; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer;">
      Cancelar
    </button>
  </div>

  <!-- Tabla -->
  <table style="width:100%; border-collapse: collapse;">
    <thead>
      <tr style="background:#1976D2; color:white;">
        <th style="padding:12px;">ID</th>
        <th style="padding:12px;">Nombre</th>
        <th style="padding:12px;">Descripción</th>
        <th style="padding:12px;">Precio</th>
        <th style="padding:12px;">Stock</th>
        <th style="padding:12px;">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of productos" style="border-bottom: 1px solid #ddd;">
        <td style="padding:10px; text-align:center;">{{ p.id }}</td>
        <td style="padding:10px;">{{ p.nombre }}</td>
        <td style="padding:10px;">{{ p.descripcion }}</td>
        <td style="padding:10px; text-align:right;">S/. {{ p.precio }}</td>
        <td style="padding:10px; text-align:center;">{{ p.stock }}</td>
        <td style="padding:10px; text-align:center;">
          <button (click)="editar(p)" style="background:#FF9800; color:white; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; margin-right:4px;">Editar</button>
          <button (click)="eliminar(p.id!)" style="background:#f44336; color:white; padding:6px 12px; border:none; border-radius:4px; cursor:pointer;">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
